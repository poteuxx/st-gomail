<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to StGo-Mail | Futuristic Communication</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="landing-page">

    <nav class="landing-nav glass">
        <div class="logo">
            <i class="fas fa-paper-plane"></i>
            <span>StGo-Mail</span>
        </div>
        <div class="nav-links">
            <a href="login.html" class="btn btn-ghost">Login</a>
            <a href="register.html" class="btn btn-primary">Join Now</a>
        </div>
    </nav>

    <main class="hero-section">
        <div class="hero-content animate-fade">
            <span class="badge">Version 2.0 - Pulsar Edition</span>
            <h1>The Future of <span>Communication</span> is Here.</h1>
            <p>Experience the most advanced, secure, and futuristic email platform ever built. Inspired by Google, designed for the next generation.</p>
            
            <div class="hero-cta">
                <a href="register.html" class="btn btn-primary btn-lg">
                    Get Started Free
                    <i class="fas fa-bolt"></i>
                </a>
                <div class="stats-mini">
                    <div class="stat-item">
                        <span class="val">1M+</span>
                        <span class="lab">Users</span>
                    </div>
                    <div class="stat-item">
                        <span class="val">99.9%</span>
                        <span class="lab">Uptime</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="hero-visual animate-fade" style="animation-delay: 0.2s">
            <div class="mockup-container glass-panel">
                <div class="mockup-header">
                    <div class="dots"><span></span><span></span><span></span></div>
                    <div class="mock-search"></div>
                </div>
                <div class="mockup-body">
                    <div class="mock-sidebar"></div>
                    <div class="mock-content">
                        <div class="mock-line"></div>
                        <div class="mock-line"></div>
                        <div class="mock-line"></div>
                        <div class="mock-line short"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .landing-page {
            background: var(--bg-deep);
            overflow-x: hidden;
        }

        .landing-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 0 10%;
            padding-top: 80px;
            gap: 40px;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(108, 140, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
        }

        .hero-content h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .hero-content h1 span {
            color: var(--secondary);
            text-shadow: 0 0 20px var(--secondary-glow);
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .btn-lg {
            padding: 18px 36px;
            font-size: 1.1rem;
        }

        .stats-mini {
            display: flex;
            gap: 40px;
            margin-top: 40px;
        }

        .stat-item .val {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-item .lab {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .hero-visual {
            flex: 1;
            perspective: 1000px;
        }

        .mockup-container {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            transform: rotateY(-20deg) rotateX(10deg);
            box-shadow: -20px 20px 50px rgba(0,0,0,0.5);
            padding: 0;
            overflow: hidden;
            border: 1px solid var(--border-neon);
        }

        .mockup-header {
            height: 40px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
        }

        .dots { display: flex; gap: 5px; }
        .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }
        .mock-search { flex: 1; height: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; }

        .mockup-body { display: flex; height: 100%; }
        .mock-sidebar { width: 60px; border-right: 1px solid var(--border-light); background: rgba(108,140,255,0.02); }
        .mock-content { flex: 1; padding: 20px; }
        .mock-line { height: 12px; background: rgba(255,255,255,0.05); margin-bottom: 12px; border-radius: 6px; }
        .mock-line.short { width: 60%; }

        @media (max-width: 1024px) {
            .hero-section { flex-direction: column; text-align: center; justify-content: center; padding-top: 150px; }
            .hero-content { max-width: 100%; }
            .hero-visual { display: none; }
            .hero-content h1 { font-size: 3rem; }
        }
    </style>

    <script src="firebase/firebase-config.js"></script>
    <script>
        // Redirect if already logged in
        firebase.auth().onAuthStateChanged(user => {
            if (user) window.location.href = 'inbox.html';
        });
    </script>
</body>
</html>
