<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StGo-Mail</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="services/i18n.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container animate-fade">
        <div class="auth-card glass-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <h1>StGo-<span>Mail</span></h1>
                <p>Welcome back, futuristic voyager.</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email or Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="text" id="email" placeholder="name@stgo.mail" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-full" id="loginBtn">
                    <span data-i18n="landing.login">Login to Workspace</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Identify yourself</a></p>
            </div>
        </div>
    </div>

    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #151a2b 0%, #0b0f1a 100%);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .brand h1 span {
            color: var(--secondary);
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: var(--transition-fast);
        }

        .input-wrapper input {
            padding-left: 48px;
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .forgot-pass {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .forgot-pass:hover {
            color: var(--secondary);
        }

        .w-full { width: 100%; }

        .auth-footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>

    <script src="firebase/firebase-config.js"></script>
    <script src="firebase/auth.js"></script>
    <script>
        // Specific login page logic
        const loginForm = document.getElementById('loginForm');
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            try {
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                
                await window.authService.login(email, pass);
                window.location.href = 'inbox.html';
            } catch (error) {
                alert(error.message);
                btn.disabled = false;
                btn.innerHTML = '<span>Login to Workspace</span> <i class="fas fa-arrow-right"></i>';
            }
        };
    </script>
</body>
</html>
