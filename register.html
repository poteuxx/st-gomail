<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | StGo-Mail</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="services/cryptoService.js"></script>
    <script src="services/i18n.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container animate-fade">
        <div class="auth-card glass-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 data-i18n="auth.createIdentity">Create <span>Identity</span></h1>
                <p data-i18n="auth.startJourney">Start your journey in the futurist workspace.</p>
                <div class="e2ee-badge">
                    <i class="fas fa-lock"></i>
                    <span>E2EE Protected</span>
                </div>
            </div>

            <form id="registerForm">
                <div class="input-group">
                    <label for="displayName" data-i18n="auth.displayName">Display Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="displayName" placeholder="John Doe" data-i18n="auth.displayName" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="username" data-i18n="auth.username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-tag"></i>
                        <input type="text" id="username" placeholder="johndoe" data-i18n="auth.username" required>
                    </div>
                    <div id="suggestBox" class="suggestions"></div>
                </div>

                <div class="input-group">
                    <label for="emailPrefix" data-i18n="auth.newIdentity">New Email Identity</label>
                    <div class="input-wrapper email-split">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="emailPrefix" placeholder="identity" data-i18n="auth.newIdentity" required>
                        <select id="emailDomain" required>
                            <option value="@stgo.mail">@stgo.mail</option>
                            <option value="@stgo.io">@stgo.io</option>
                            <option value="@poteuxx.io">@poteuxx.io</option>
                            <option value="@identity.io">@identity.io</option>
                            <option value="@secure.io">@secure.io</option>
                            <option value="@futur.st">@futur.st</option>
                            <option value="@st.gomail">@st.gomail</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password" data-i18n="auth.password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" data-i18n="auth.password" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full" id="regBtn">
                    <span data-i18n="auth.finalize">Finalize Identity</span>
                    <i class="fas fa-check"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p><span data-i18n="auth.alreadyHaveId">Already have an ID?</span> <a href="login.html" data-i18n="auth.loginHere">Login here</a></p>
            </div>
        </div>
    </div>

    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #151a2b 0%, #0b0f1a 100%);
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .auth-card {
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .brand h1 span {
            color: var(--accent);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: var(--transition-fast);
        }

        .input-wrapper input {
            padding-left: 48px;
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        .email-split {
            display: flex;
            gap: 10px;
        }

        .email-split input {
            flex: 1;
        }

        .email-split select {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            color: white;
            padding: 0 15px;
            outline: none;
            cursor: pointer;
            transition: var(--transition-fast);
            min-width: 140px;
        }

        .email-split select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .suggest-item {
            background: var(--bg-card);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: var(--transition-fast);
        }

        .suggest-item:hover {
            border-color: var(--primary);
            background: var(--bg-glass);
        }

        .e2ee-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
            font-weight: 600;
        }

        .w-full { width: 100%; }

        .auth-footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>

    <script src="firebase/firebase-config.js"></script>
    <script src="firebase/auth.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const displayNameInput = document.getElementById('displayName');
        const usernameInput = document.getElementById('username');
        const suggestBox = document.getElementById('suggestBox');

        displayNameInput.addEventListener('input', (e) => {
            const val = e.target.value.trim().toLowerCase().replace(/[^a-z0-9]/g, "");
            if (val.length < 2) {
                suggestBox.innerHTML = '';
                return;
            }
            
            const suffixes = [".stgo", "_mail", "2026", ".nx"];
            suggestBox.innerHTML = '';
            suffixes.forEach(s => {
                const span = document.createElement('span');
                span.className = 'suggest-item';
                span.innerText = val + s;
                span.onclick = () => usernameInput.value = val + s;
                suggestBox.appendChild(span);
            });
        });

        registerForm.onsubmit = async (e) => {
            e.preventDefault();
            const prefix = document.getElementById('emailPrefix').value;
            const domain = document.getElementById('emailDomain').value;
            const email = prefix + domain;
            
            const pass = document.getElementById('password').value;
            const name = displayNameInput.value;
            const user = usernameInput.value;
            
            try {
                const btn = document.getElementById('regBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating identity...';
                
                await window.authService.register(email, pass, name, user);
                window.location.href = 'inbox.html';
            } catch (error) {
                alert(error.message);
                btn.disabled = false;
                btn.innerHTML = '<span>Finalize Identity</span> <i class="fas fa-check"></i>';
            }
        };
    </script>
</body>
</html>
